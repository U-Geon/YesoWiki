# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# ─────────────────────────────────────────────
# General Settings
# ─────────────────────────────────────────────
language: "ko-KR" # 리뷰 코멘트를 한국어로 작성

reviews:
  # ─── 리뷰 프로필 ───────────────────────────
  profile: "assertive" # 엄격한 리뷰 (chill: 부드럽게 / assertive: 엄격하게)
  request_changes_workflow: false # 자동 "Request Changes" 사용 안 함 (수동 병합 결정)

  # ─── PR 요약 설정 ──────────────────────────
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  sequence_diagrams: true # 복잡한 데이터 흐름 시퀀스 다이어그램 자동 생성
  assess_linked_issues: true # 연관된 GitHub Issue를 분석해 PR이 요구사항을 충족하는지 검증
  related_issues: true
  related_prs: true

  # ─── 자동 리뷰 설정 ────────────────────────
  auto_review:
    enabled: true
    drafts: false # Draft PR은 자동 리뷰 스킵
    base_branches:
      - "develop" # develop으로의 PR만 자동 리뷰 (feat/*, fix/*, chore/* → develop)
      - "main" # main으로의 PR도 리뷰 (develop → main 릴리즈 PR)

  # ─── 리뷰 제외 경로 ────────────────────────
  # 코드가 아닌 문서/설정/에이전트 파일 변경 시 코드 리뷰 불필요
  path_filters:
    - "!plans/**"       # 작업 기획 파일 제외
    - "!docs/**"        # 프로젝트 문서 제외
    - "!.agents/**"     # 에이전트 메모리/스킬 파일 제외
    - "!**/*.md"        # 루트 마크다운 파일 제외
    - "!pnpm-lock.yaml" # 패키지 락 파일 제외

  # ─── 경로별 맞춤 리뷰 지침 ─────────────────
  path_instructions:
    # Next.js App Router — 전체 src/ 영역
    - path: "src/**"
      instructions: |
        이 프로젝트는 Next.js 14 App Router를 사용합니다.
        다음 규칙을 엄격하게 검증하세요:

        **RSC 경계 (Server/Client Component)**
        - 모든 컴포넌트는 기본적으로 Server Component입니다.
        - `"use client"`는 반드시 필요한 최하단(Leaf) 컴포넌트에만 허용합니다.
        - async Client Component는 절대 허용하지 않습니다.

        **데이터 패턴**
        - 데이터 읽기(Read)는 Server Component에서 Prisma를 직접 호출합니다. API Route 불필요.
        - 데이터 변이(Mutation)는 Server Actions(`"use server"`)를 사용합니다. REST API 지양.
        - 비동기 Server Action 이후에는 반드시 `revalidatePath()` 또는 `revalidateTag()`를 호출해야 합니다.

        **보안**
        - 사용자 입력(title, content 등)은 서버에서 반드시 trim + 유효성 검사를 수행해야 합니다.
        - 마크다운 렌더링 시 `rehype-sanitize`가 적용되었는지 확인합니다. (XSS 방지 필수)

        **SSOT 원칙**
        - `prisma/schema.prisma`가 데이터 진실 공급원입니다.
        - 타입을 중복 정의하지 말고 Prisma 자동 생성 타입을 활용합니다.

    # Prisma 스키마 변경 시 특별 주의
    - path: "prisma/schema.prisma"
      instructions: |
        Prisma 스키마 변경은 데이터 마이그레이션을 동반할 수 있습니다. 다음을 검증하세요:
        - 새 모델/필드 추가 시 기존 데이터와의 호환성을 확인합니다.
        - `@unique` 제약이 변경된 경우 데이터 손실 가능성을 검토합니다.
        - 관계(Relation) 변경 시 cascade delete 동작을 명시적으로 확인합니다.
        - `docs/ERD.md`도 함께 업데이트되었는지 확인합니다. (SSOT 원칙)

    # GitHub Actions 워크플로우
    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions 워크플로우 변경 시 다음을 확인합니다:
        - `GITHUB_TOKEN` 이외의 시크릿은 `.env`에 노출되지 않았는지 확인합니다.
        - `actions/*`의 버전이 고정(예: `@v4`)되어 있는지 확인합니다. `@latest` 사용 금지.
        - pnpm 사용 시 `setup-node` + `pnpm install`의 캐시 설정이 있는지 확인합니다.

    # 컴포넌트
    - path: "src/components/**"
      instructions: |
        - 파일명은 PascalCase를 사용합니다 (예: WikiEditor.tsx).
        - props 타입은 `interface`로 정의합니다. `type`은 union/intersection에만 사용합니다.
        - import 순서: React/Next.js → 외부 라이브러리 → 내부(@/) → 상대경로.

    # 라이브러리/유틸
    - path: "src/lib/**"
      instructions: |
        - 파일명은 kebab-case를 사용합니다 (예: prisma-client.ts).
        - Prisma Client는 싱글턴 패턴을 사용합니다. (`src/lib/prisma.ts`)
        - 비즈니스 로직 유틸 함수는 순수 함수(Pure Function)로 작성합니다.

  # ─── Finishing Touches ─────────────────────
  finishing_touches:
    docstrings:
      enabled: false # 한국어 프로젝트이므로 docstring 자동 생성 비활성화

# ─────────────────────────────────────────────
# Knowledge Base
# ─────────────────────────────────────────────
knowledge_base:
  learnings:
    scope: auto # PR 리뷰에서 학습한 내용을 자동으로 지식 베이스에 축적
  opt_out: false
